name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint and config sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hadolint (Dockerfile, advisory)
        # Advisory only: hadolint upstream cannot yet parse BuildKit heredocs
        # (`RUN cat > foo <<'EOF' ... EOF`), see hadolint/hadolint#735, and
        # this Dockerfile uses them for /root/.tmux.conf and /root/.bashrc.
        # Keep the report visible in CI logs but do not block PRs on it.
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: claudecode/Dockerfile
          # DL3008/DL3013/DL3018: pinning every apt/pip/apk package version is
          # impractical for an HA app image; cadence is owned by the base image.
          # DL4006: the CMD is a single `&&` chain, no pipes, so set -o pipefail
          # would not buy us anything.
          ignore: DL3008,DL3013,DL3018,DL4006
          failure-threshold: error
          no-fail: true

      - name: Validate YAML config files parse
        run: |
          python3 - <<'PY'
          import yaml
          for p in ("claudecode/config.yaml", "claudecode/build.yaml", "repository.yaml"):
              with open(p) as f:
                  yaml.safe_load(f)
              print(f"ok: {p}")
          PY

      - name: Version matches CHANGELOG entry
        run: |
          set -euo pipefail
          VERSION=$(python3 -c "import yaml; print(yaml.safe_load(open('claudecode/config.yaml'))['version'])")
          echo "config.yaml version: $VERSION"
          if ! grep -qE "^## \[${VERSION}\] - [0-9]{4}-[0-9]{2}-[0-9]{2}\$" claudecode/CHANGELOG.md; then
              echo "::error file=claudecode/CHANGELOG.md::Missing entry '## [$VERSION] - YYYY-MM-DD' for current version"
              exit 1
          fi

      - name: options and schema keys are in sync
        run: |
          python3 - <<'PY'
          import sys, yaml
          cfg = yaml.safe_load(open("claudecode/config.yaml"))
          missing = [k for k in ("options", "schema") if k not in cfg]
          if missing:
              print(f"::error::config.yaml missing keys: {missing}")
              sys.exit(1)
          opts, schema = set(cfg["options"]), set(cfg["schema"])
          if opts != schema:
              if opts - schema:
                  print(f"::error::options without schema entry: {sorted(opts - schema)}")
              if schema - opts:
                  print(f"::error::schema entries without an options default: {sorted(schema - opts)}")
              sys.exit(1)
          print(f"ok: {len(opts)} options, schema in sync")
          PY

  boot-script-shell:
    name: Boot script syntax and shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Extract embedded boot script
        run: python3 .github/scripts/extract-boot-script.py > /tmp/boot.sh

      - name: bash -n (parse-only syntax check)
        run: bash -n /tmp/boot.sh

      - name: shellcheck (advisory)
        # Advisory: the extracted script is one long joined line so location
        # info is approximate, and several `$VAR` expansions are intentionally
        # word-split. Keep the check non-blocking until the boot logic is
        # promoted to a standalone boot.sh tracked in the repo.
        run: |
          shellcheck \
            -e SC2086 -e SC2155 -e SC2046 -e SC2016 -e SC1009 -e SC1073 -e SC1072 \
            /tmp/boot.sh || true

  build:
    name: Docker build smoke (amd64)
    runs-on: ubuntu-latest
    needs: [lint, boot-script-shell]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build app image
        uses: docker/build-push-action@v5
        with:
          context: claudecode
          file: claudecode/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: hass-claude-test:amd64
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/amd64-base-python:3.13-alpine3.21
            BUILD_ARCH=amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Expected tools are installed
        run: |
          docker run --rm hass-claude-test:amd64 sh -eu -c '
            command -v claude   >/dev/null && echo "claude:   $(claude --version 2>&1 | head -n1)"
            command -v jq       >/dev/null && echo "jq:       $(jq --version)"
            command -v ttyd     >/dev/null && echo "ttyd:     installed"
            command -v node     >/dev/null && echo "node:     $(node --version)"
            command -v npm      >/dev/null && echo "npm:      $(npm --version)"
            command -v hass-mcp >/dev/null && echo "hass-mcp: installed"
            command -v tmux     >/dev/null && echo "tmux:     $(tmux -V)"
            command -v docker   >/dev/null && echo "docker:   $(docker --version)"
            command -v rg       >/dev/null && echo "rg:       $(rg --version | head -n1)"
          '

      - name: Boot smoke runs the real script with ttyd stubbed out
        run: |
          set -euo pipefail
          mkdir -p smoke/data smoke/homeassistant
          cat > smoke/data/options.json <<'EOF'
          {
            "enable_mcp": true,
            "terminal_font_size": 14,
            "terminal_theme": "dark",
            "working_directory": "/homeassistant",
            "session_persistence": false,
            "auto_update_claude": false,
            "claude_update_timeout": 300
          }
          EOF
          # Pull the actual boot script out of the Dockerfile and replace the
          # tail `exec ttyd ...` with a marker echo so the script returns.
          python3 .github/scripts/extract-boot-script.py > smoke/boot-real.sh
          sed -E 's|exec ttyd .*$|echo "[smoke] boot reached ttyd launch (stubbed)"|' \
            smoke/boot-real.sh > smoke/boot-smoke.sh
          # /data is mounted rw to match Supervisor behaviour: the boot
          # script seeds /data/npm-global from /opt/npm-global on first
          # boot (issue #13) and auto_update_claude writes there too.
          # /homeassistant is mounted rw to emulate the persistent HA config
          # volume so the .claude.json symlink target is observable from the
          # host after the run (regression guard for #20).
          docker run --rm \
            -v "$PWD/smoke/data:/data:rw" \
            -v "$PWD/smoke/homeassistant:/homeassistant:rw" \
            -v "$PWD/smoke/boot-smoke.sh:/usr/local/bin/boot-smoke.sh:ro" \
            --entrypoint /bin/bash \
            hass-claude-test:amd64 \
            /usr/local/bin/boot-smoke.sh 2>&1 | tee smoke/boot.log
          # Required boot-script log lines.
          grep -q '\[INFO\] MCP configured with Home Assistant integration' smoke/boot.log
          grep -q '\[INFO\] Pre-authorized read-only MCP tools'             smoke/boot.log
          grep -q '\[INFO\] auto_update_claude disabled - skipping update'  smoke/boot.log
          grep -q '\[INFO\] Seeding /data/npm-global from /opt/npm-global'  smoke/boot.log
          grep -q '\[smoke\] boot reached ttyd launch (stubbed)'            smoke/boot.log
          # Seeded layout must actually contain the claude binary symlink,
          # and the seed-complete marker must be written (issue #22).
          test -x smoke/data/npm-global/bin/claude
          test -f smoke/data/npm-global/.seed-complete
          grep -q '\[INFO\] Seeded /data/npm-global' smoke/boot.log
          # Regression guard for #20: the MCP-registration step must land the
          # config on the PERSISTENT volume, written through the
          # /root/.claude.json symlink to its target. The old code did
          # `mv /tmp/claude.tmp "$CLAUDE_JSON"`, which rename(2)-replaced the
          # symlink with a plain file in the ephemeral layer, so the persistent
          # target stayed an empty `{}` and login state never survived a
          # restart. If that regresses, the file below has no mcpServers and the
          # jq assertion fails.
          test -f smoke/homeassistant/.claudecode/.claude.json
          jq -e '.mcpServers.homeassistant.command == "hass-mcp"' \
            smoke/homeassistant/.claudecode/.claude.json >/dev/null
          # Regression guard for #15/#16: the web terminal opens a login shell,
          # and /etc/profile on the Alpine base resets PATH. `claude` must still
          # resolve on PATH in a real login shell, not just exist on disk.
          docker run --rm \
            -v "$PWD/smoke/data:/data:rw" \
            --entrypoint /bin/bash \
            hass-claude-test:amd64 \
            -lc 'command -v claude' | grep -q '/npm-global/bin/claude'

      - name: Boot repairs a broken/partial /data/npm-global seed (regression guard for #22)
        run: |
          set -euo pipefail
          mkdir -p smoke/data-broken/npm-global/bin
          cat > smoke/data-broken/options.json <<'EOF'
          {
            "enable_mcp": true,
            "terminal_font_size": 14,
            "terminal_theme": "dark",
            "working_directory": "/homeassistant",
            "session_persistence": false,
            "auto_update_claude": false,
            "claude_update_timeout": 300
          }
          EOF
          # Simulate the partial tree a failed first-boot seed leaves on a
          # Protection-mode-on host: an executable but non-working bin/claude
          # launcher and NO .seed-complete marker. The old `[ ! -x bin/claude ]`
          # guard latched this state forever and it shadowed /opt on PATH; the
          # marker-gated self-healing seed must detect it and re-seed a good tree.
          printf '#!/bin/sh\nexit 1\n' > smoke/data-broken/npm-global/bin/claude
          chmod +x smoke/data-broken/npm-global/bin/claude
          # Reuse the stubbed boot script generated by the step above.
          docker run --rm \
            -v "$PWD/smoke/data-broken:/data:rw" \
            -v "$PWD/smoke/homeassistant:/homeassistant:rw" \
            -v "$PWD/smoke/boot-smoke.sh:/usr/local/bin/boot-smoke.sh:ro" \
            --entrypoint /bin/bash \
            hass-claude-test:amd64 \
            /usr/local/bin/boot-smoke.sh 2>&1 | tee smoke/boot-broken.log
          # The boot must have repaired the tree and marked it complete.
          grep -q '\[INFO\] Seeded /data/npm-global' smoke/boot-broken.log
          test -f smoke/data-broken/npm-global/.seed-complete
          # The repaired launcher must be the real one and actually run.
          docker run --rm \
            -v "$PWD/smoke/data-broken:/data:rw" \
            --entrypoint /bin/bash \
            hass-claude-test:amd64 \
            -lc 'claude --version' >/dev/null

      - name: Boot smoke covers the failure-tail path on a forced timeout
        run: |
          set -euo pipefail
          mkdir -p smoke/data-update
          # auto_update_claude=true with a 1s timeout forces the failure path
          # so we can exercise the new tail-on-failure / append-log code.
          cat > smoke/data-update/options.json <<'EOF'
          {
            "enable_mcp": true,
            "terminal_font_size": 14,
            "terminal_theme": "dark",
            "working_directory": "/homeassistant",
            "session_persistence": false,
            "auto_update_claude": true,
            "claude_update_timeout": 1
          }
          EOF
          python3 .github/scripts/extract-boot-script.py > smoke/boot-real.sh
          sed -E 's|exec ttyd .*$|wait; echo "[smoke] boot reached ttyd (stubbed); waited for background update"|' \
            smoke/boot-real.sh > smoke/boot-smoke-update.sh
          # /data mounted rw: auto_update_claude now writes to
          # /data/npm-global via NPM_CONFIG_PREFIX (issue #13).
          docker run --rm \
            -v "$PWD/smoke/data-update:/data:rw" \
            -v "$PWD/smoke/boot-smoke-update.sh:/usr/local/bin/boot-smoke.sh:ro" \
            --entrypoint /bin/bash \
            hass-claude-test:amd64 \
            /usr/local/bin/boot-smoke.sh 2>&1 | tee smoke/boot-update.log
          grep -q '\[INFO\] Updating Claude Code in background (timeout 1s)' smoke/boot-update.log
          grep -q '\[WARN\] Claude Code update failed/timed out'             smoke/boot-update.log
          # Tail-on-failure must produce at least one indented line.
          grep -qE '^  \| '                                                  smoke/boot-update.log
